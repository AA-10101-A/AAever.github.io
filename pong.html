<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alin</title>
    <style>
        :root {
            --primary: #93c5fd;
            --primary-dark: #60a5fa;
            --primary-light: #bfdbfe;
            --primary-pale: #dbeafe;
            --bg-deep: #060610;
            --text-primary: #ffffff;
            --text-secondary: #bfdbfe;
            --text-muted: #8b8ba8;
            --border: rgba(147, 197, 253, 0.2);
            --glow: rgba(147, 197, 253, 0.4);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @font-face {
            font-family: a;
            src: url(./katibeh.ttf);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: a;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #060610;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .galaxy-sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            will-change: transform, opacity;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.25; transform: scale(1); }
            20% { opacity: 1; transform: scale(2); }
            40% { opacity: 0.35; transform: scale(1); }
            60% { opacity: 0.9; transform: scale(1.6); }
            80% { opacity: 0.4; transform: scale(1); }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px 1px rgba(255, 255, 255, 0.9), 0 0 15px 4px rgba(147, 197, 253, 0.7);
            animation: shoot var(--shoot-duration) linear infinite;
            animation-delay: var(--shoot-delay);
            opacity: 0;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
            right: 100%;
        }

        @keyframes shoot {
            0% { opacity: 0; transform: translate(0, 0) rotate(-35deg); }
            4% { opacity: 1; }
            12% { opacity: 0; transform: translate(-350px, 250px) rotate(-35deg); }
            100% { opacity: 0; transform: translate(-350px, 250px) rotate(-35deg); }
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            animation: nebulaPulse 8s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes nebulaPulse {
            0%, 100% { transform: scale(1); opacity: 0.25; }
            50% { transform: scale(1.25); opacity: 0.45; }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .picker-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .picker-screen.active {
            display: flex;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .picker-card {
            background: rgba(20, 20, 40, 0.55);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius-xl);
            padding: clamp(20px, 5vw, 35px) clamp(15px, 4vw, 25px);
            border: 1px solid var(--border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 50px rgba(147, 197, 253, 0.08);
            width: 100%;
            max-width: 420px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: clamp(15px, 4vw, 25px);
        }

        .game-icon {
            font-size: clamp(2.5rem, 8vw, 4rem);
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .game-title {
            font-size: clamp(1.6rem, 5vw, 2.3rem);
            font-weight: 900;
            background: linear-gradient(135deg, #bfdbfe, #93c5fd, #60a5fa, #3b82f6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
            letter-spacing: -0.5px;
            margin-top: 5px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .game-subtitle {
            color: var(--text-muted);
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            font-weight: 400;
            margin-top: 4px;
        }

        .picker-label {
            color: var(--text-secondary);
            font-size: clamp(0.85rem, 3vw, 1rem);
            font-weight: 500;
            margin-bottom: clamp(15px, 3vw, 20px);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .picker-label::before,
        .picker-label::after {
            content: '';
            width: 20px;
            height: 1px;
            background: var(--border);
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(8px, 2vw, 12px);
        }

        .emoji-option {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            font-size: clamp(1.8rem, 6vw, 2.6rem);
            padding: clamp(12px, 3vw, 18px) clamp(4px, 1vw, 10px);
            cursor: pointer;
            transition: all var(--transition-bounce);
            text-align: center;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .emoji-option:active {
            transform: scale(0.9);
            background: rgba(147, 197, 253, 0.2);
        }

        .emoji-option.selected {
            background: rgba(147, 197, 253, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(147, 197, 253, 0.5), 0 0 60px rgba(147, 197, 253, 0.2);
            transform: scale(1.05);
            animation: selectedGlow 1.5s ease-in-out infinite;
        }

        @keyframes selectedGlow {
            0%, 100% { box-shadow: 0 0 25px rgba(147, 197, 253, 0.5), 0 0 50px rgba(147, 197, 253, 0.2); }
            50% { box-shadow: 0 0 40px rgba(147, 197, 253, 0.8), 0 0 80px rgba(147, 197, 253, 0.4); }
        }

        .check-mark {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: #1e3a5f;
            transform: scale(0);
            transition: transform var(--transition-bounce);
            font-weight: bold;
        }

        .emoji-option.selected .check-mark {
            transform: scale(1);
        }

        .game-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100%;
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-screen.active {
            display: flex;
        }

        .game-card {
            background: rgba(20, 20, 40, 0.55);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius-xl);
            padding: clamp(10px, 3vw, 16px);
            border: 1px solid var(--border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 50px rgba(147, 197, 253, 0.08);
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(8px, 2vw, 12px);
            padding: clamp(8px, 2vw, 12px) clamp(10px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .score-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: clamp(0.6rem, 2vw, 0.7rem);
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #bfdbfe, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            transition: transform 0.15s;
        }

        .score-value.pop {
            transform: scale(1.35);
        }

        .current-emoji-display {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            animation: float 2.5s ease-in-out infinite;
        }

        .combo-mini {
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            font-weight: 700;
            color: #fbbf24;
            text-align: center;
            min-width: 40px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .canvas-wrapper {
            position: relative;
            flex: 1 1 auto; 
            width: 100%;
            height: 100%;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 0 35px rgba(147, 197, 253, 0.12);
            border: 2px solid rgba(147, 197, 253, 0.12);
            transition: border-color 0.5s, box-shadow 0.5s;
            min-height: 100px;
        }

        .canvas-wrapper.game-over-glow {
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 45px rgba(239, 68, 68, 0.25);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            background: #060610;
            cursor: none;
        }

        .love-popup {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            font-weight: 700;
            pointer-events: none;
            z-index: 100;
            color: #fbbf24;
            text-align: center;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.9), 0 0 60px rgba(251, 191, 36, 0.5);
            animation: lovePopIn 1.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            white-space: nowrap;
            padding: 12px 24px;
            background: rgba(10, 10, 20, 0.6);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        @keyframes lovePopIn {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
            25% { transform: translate(-50%, -50%) scale(1.25) rotate(5deg); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -85%) scale(0.7) rotate(0deg); opacity: 0; }
        }

        @media (max-width: 350px) {
            .emoji-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
            }
            .emoji-option {
                font-size: 1.5rem;
                padding: 10px 2px;
            }
            .game-header {
                padding: 8px 10px;
            }
        }

        @media (min-width: 420px) {
            .emoji-grid {
                gap: 14px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .app-container {
                flex-direction: row;
                padding: 8px;
            }
            .picker-screen, .game-screen {
                flex: 1;
            }
            .picker-card {
                padding: 15px;
                max-width: 350px;
            }
            .emoji-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
            }
            .emoji-option {
                font-size: 1.4rem;
                padding: 8px 2px;
            }
            .game-header {
                padding: 6px 10px;
                margin-bottom: 6px;
            }
            .score-value {
                font-size: 1.5rem;
            }
            .current-emoji-display {
                font-size: 1.5rem;
            }
            .logo-section {
                margin-bottom: 10px;
            }
            .game-icon {
                font-size: 2rem;
            }
            .game-title {
                font-size: 1.3rem;
            }
            .picker-label {
                margin-bottom: 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="galaxy-sky" id="galaxySky"></div>

    <div class="app-container" id="appContainer">
        <div class="picker-screen active" id="pickerScreen">
            <div class="picker-card">
                <div class="logo-section">
                    <div class="game-icon">🌌</div>
                    <h1 class="game-title">Alin</h1>
                    <p class="game-subtitle">سلامم دختر نازمم</p>
                </div>
                <p class="picker-label">
                    <span>✨</span>
                    ایموجیتو انتخاب کن
                    <span>✨</span>
                </p>
                <div class="emoji-grid" id="emojiGrid">
                    <div class="emoji-option" data-emoji="✨"><span class="check-mark">✓</span>✨</div>
                    <div class="emoji-option" data-emoji="🩵"><span class="check-mark">✓</span>🩵</div>
                    <div class="emoji-option" data-emoji="🙎🏻‍♀️"><span class="check-mark">✓</span>🙎🏻‍♀️</div>
                    <div class="emoji-option" data-emoji="🙂‍↔️"><span class="check-mark">✓</span>🙂‍↔️</div>
                    <div class="emoji-option" data-emoji="🪼"><span class="check-mark">✓</span>🪼</div>
                    <div class="emoji-option" data-emoji="💘"><span class="check-mark">✓</span>💘</div>
                    <div class="emoji-option" data-emoji="🦢"><span class="check-mark">✓</span>🦢</div>
                    <div class="emoji-option" data-emoji="🫐"><span class="check-mark">✓</span>🫐</div>
                </div>
            </div>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="game-card">
                <div class="game-header">
                    <div class="score-section">
                        <span class="score-label">✨ تعداد بوس</span>
                        <span class="score-value" id="scoreDisplay">0</span>
                    </div>
                    <div class="current-emoji-display" id="currentEmojiDisplay">😂</div>
                    <div class="combo-mini" id="comboMini"></div>
                </div>
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="gameCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            function createGalaxySky() {
                const sky = document.getElementById('galaxySky');
                
                const nebulae = [
                    { color: 'rgba(147, 197, 253, 0.35)', top: '10%', left: '15%', size: '30vmax' },
                    { color: 'rgba(96, 165, 250, 0.25)', top: '55%', left: '65%', size: '25vmax' },
                    { color: 'rgba(191, 219, 254, 0.2)', top: '35%', left: '5%', size: '22vmax' },
                    { color: 'rgba(147, 197, 253, 0.18)', top: '70%', left: '25%', size: '28vmax' },
                ];
                
                nebulae.forEach(n => {
                    const el = document.createElement('div');
                    el.className = 'nebula';
                    el.style.cssText = `
                        background: ${n.color};
                        top: ${n.top}; left: ${n.left};
                        width: ${n.size}; height: ${n.size};
                    `;
                    sky.appendChild(el);
                });

                const starCount = 180;
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 4.5 + 1;
                    const duration = Math.random() * 5 + 2;
                    const delay = Math.random() * 6;
                    const top = Math.random() * 100;
                    const left = Math.random() * 100;
                    const colors = ['#ffffff', '#bfdbfe', '#fde68a', '#a5f3fc', '#fbcfe8', '#e9d5ff', '#ffffff', '#dbeafe'];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    star.style.cssText = `
                        width: ${size}px;
                        height: ${size}px;
                        top: ${top}%;
                        left: ${left}%;
                        background: ${color};
                        box-shadow: 0 0 ${size * 2.5}px ${color};
                        --duration: ${duration}s;
                        --delay: ${delay}s;
                    `;
                    sky.appendChild(star);
                }

                for (let i = 0; i < 4; i++) {
                    const shootingStar = document.createElement('div');
                    shootingStar.className = 'shooting-star';
                    shootingStar.style.cssText = `
                        top: ${Math.random() * 40}%;
                        left: ${Math.random() * 50 + 40}%;
                        --shoot-duration: ${Math.random() * 5 + 3}s;
                        --shoot-delay: ${Math.random() * 10}s;
                    `;
                    sky.appendChild(shootingStar);
                }
            }
            createGalaxySky();
            
            const lovePhrases = [
                "✨ تو این بازی از تو بهتر وجود ندارهه ✨",
                "💫 فدای اون انگشتای کوچولوت بشم 💫",
                "🌙 چقد تو خوبی جیگرر 🌙",
                "💙 هر امتیاز که میگیری یه بوس طلبتت 💙",
                "🌟 میدونستم قراره انقد قوی باشی 🌟",
                "🪐 دورت بگردم من انقد خوبی اخه 🪐",
                "💖 باریکلا به تووو 💖",
                "🌸 تو بهترین اتفاق زندگیمی 🌸",
                "🔥 دیگه داری بازیو به آتیش میکشیا 🔥",
                "میدونستی اصلا نمیتونی تو این بازی ببازی؟"
            ];

            function getRandomLovePhrase() {
                return lovePhrases[Math.floor(Math.random() * lovePhrases.length)];
            }

            let canvas, ctx;
            let selectedEmoji = '😂';
            let gameRunning = false;
            let animationId = null;
            let comboCount = 0;
            
            let lastTime = 0;
            let canRestart = false; 

            let cachedBgGradient = null;
            const EMOJI_FONT_STACK = '"Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", "EmojiOne Color", "Android Emoji", sans-serif';

            let ball = {
                x: 0, y: 0,
                radius: 24,
                dx: 0, dy: 0,
                speed: 0,
                trail: []
            };

            let paddle = {
                width: 130,
                height: 14,
                x: 0, y: 0
            };

            let score = 0;
            let gameOver = false;
            let particles = [];
            let canvasWidth = 0;
            let canvasHeight = 0;
            let dpr = 1;

            function showScreen(screenId) {
                document.querySelectorAll('.picker-screen, .game-screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
            }

            function startGameWithEmoji(emoji) {
                selectedEmoji = emoji;
                document.getElementById('currentEmojiDisplay').textContent = emoji;
                showScreen('gameScreen');
                stopGame();
                
                setTimeout(() => {
                    requestAnimationFrame(() => {
                        initGame();
                    });
                }, 300);
            }

            function goToPicker() {
                stopGame();
                showScreen('pickerScreen');
            }

            const emojiOptions = document.querySelectorAll('.emoji-option');
            
            emojiOptions.forEach(option => {
                option.addEventListener('pointerdown', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    emojiOptions.forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    
                    const emoji = this.dataset.emoji;
                    
                    this.style.transform = 'scale(1.15)';
                    setTimeout(() => {
                        startGameWithEmoji(emoji);
                    }, 200);
                });
            });

            function initGame() {
                canvas = document.getElementById('gameCanvas');
                ctx = canvas.getContext('2d', { alpha: false });

                updateCanvasDimensions();

                paddle.x = canvasWidth / 2 - paddle.width / 2;
                
                resetBall();
                score = 0;
                comboCount = 0;
                gameOver = false;
                canRestart = false;
                particles = [];
                ball.trail = [];
                
                document.getElementById('canvasWrapper').classList.remove('game-over-glow');
                document.getElementById('comboMini').textContent = '';
                updateScore();

                lastTime = performance.now();
                if (!gameRunning) {
                    gameRunning = true;
                    animationId = requestAnimationFrame(gameLoop);
                }

                setupInputListeners();
            }

            function updateCanvasDimensions() {
                if(!canvas) return;
                const wrapper = document.getElementById('canvasWrapper');
                canvasWidth = wrapper.clientWidth;
                canvasHeight = wrapper.clientHeight;
                
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = canvasWidth * dpr;
                canvas.height = canvasHeight * dpr;
                canvas.style.width = canvasWidth + 'px';
                canvas.style.height = canvasHeight + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);

                cachedBgGradient = ctx.createRadialGradient(canvasWidth/2, canvasHeight/2, 0, canvasWidth/2, canvasHeight/2, Math.max(canvasWidth, canvasHeight));
                cachedBgGradient.addColorStop(0, '#0a1628');
                cachedBgGradient.addColorStop(1, '#060610');
                
                paddle.y = canvasHeight - Math.max(35, canvasHeight * 0.08);
                paddle.width = Math.max(85, canvasWidth * 0.32) - (score * 1.8);
                if(paddle.width < 65) paddle.width = 65;
                
                if(paddle.x + paddle.width > canvasWidth) paddle.x = Math.max(0, canvasWidth - paddle.width);
                if(ball.x > canvasWidth) ball.x = canvasWidth - ball.radius;
                if(ball.y > canvasHeight && !gameOver) ball.y = canvasHeight - ball.radius;
            }

            function resetBall() {
                ball.x = canvasWidth / 2;
                ball.y = canvasHeight / 2;
                ball.radius = Math.max(16, Math.min(canvasWidth * 0.055, 28));
                
                const angle = (Math.random() * Math.PI / 2.2) + Math.PI / 3.5;
                const direction = Math.random() < 0.5 ? 1 : -1;
                
                ball.speed = 4.5 + (score * 0.25);
                ball.speed = Math.min(ball.speed, 18);
                ball.dx = ball.speed * Math.cos(angle) * direction;
                ball.dy = -ball.speed * Math.sin(angle);
                ball.trail = [];
            }

            function setupInputListeners() {
                canvas.removeEventListener('mousemove', handleMouseMove);
                canvas.removeEventListener('touchstart', handleTouchStart);
                canvas.removeEventListener('touchmove', handleTouchMove);
                canvas.removeEventListener('mousedown', handleMouseDown);
                canvas.removeEventListener('click', handleCanvasClick);

                canvas.addEventListener('mousemove', handleMouseMove);
                canvas.addEventListener('mousedown', handleMouseDown);
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('click', handleCanvasClick);
            }

            function getCanvasX(clientX) {
                const rect = canvas.getBoundingClientRect();
                return clientX - rect.left;
            }

            function updatePaddleFromX(clientX) {
                const x = getCanvasX(clientX);
                paddle.x = Math.max(0, Math.min(x - paddle.width / 2, canvasWidth - paddle.width));
            }

            function handleMouseDown(e) {
                if (gameOver) {
                    if(canRestart) goToPicker();
                    return;
                }
                updatePaddleFromX(e.clientX);
            }

            function handleMouseMove(e) {
                if (gameOver) return;
                updatePaddleFromX(e.clientX);
            }

            function handleTouchStart(e) {
                if (gameOver) {
                    if(canRestart) goToPicker();
                    return;
                }
                e.preventDefault();
                updatePaddleFromX(e.touches[0].clientX);
            }

            function handleTouchMove(e) {
                if (gameOver) return;
                e.preventDefault();
                updatePaddleFromX(e.touches[0].clientX);
            }

            function handleCanvasClick(e) {
                if (gameOver && canRestart) {
                    goToPicker();
                }
            }

            function spawnParticles(x, y, count) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 2;
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.03,
                        size: Math.random() * 4 + 2,
                        color: `hsl(${210 + Math.random() * 40}, 80%, ${60 + Math.random() * 30}%)`
                    });
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt; 
                    p.y += p.vy * dt;
                    p.life -= p.decay * dt;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles() {
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                
                particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }

            function showLoveCombo() {
                comboCount++;
                const miniEl = document.getElementById('comboMini');
                miniEl.textContent = comboCount >= 3 ? `💋x${comboCount}` : '';
                if (comboCount >= 3 && comboCount % 3 === 0) {
                    const popup = document.createElement('div');
                    popup.className = 'love-popup';
                    popup.textContent = getRandomLovePhrase();
                    document.body.appendChild(popup);
                    setTimeout(() => popup.remove(), 3000);
                }
            }

            function gameLoop(timestamp) {
                if (!gameRunning) return;
                
                if (!timestamp) timestamp = performance.now();
                let dt = (timestamp - lastTime) / 16.666; 
                if (dt > 3) dt = 3; 
                lastTime = timestamp;

                if (!gameOver) update(dt);
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }

            function update(dt) {
                ball.x += ball.dx * dt;
                ball.y += ball.dy * dt;

                ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
                if (ball.trail.length > 8) ball.trail.shift();
                ball.trail.forEach(t => t.life -= 0.09 * dt);

                if (ball.x - ball.radius <= 0) {
                    ball.dx = Math.abs(ball.dx);
                    ball.x = ball.radius;
                    spawnParticles(ball.x, ball.y, 8);
                }
                if (ball.x + ball.radius >= canvasWidth) {
                    ball.dx = -Math.abs(ball.dx);
                    ball.x = canvasWidth - ball.radius;
                    spawnParticles(ball.x, ball.y, 8);
                }
                if (ball.y - ball.radius <= 0) {
                    ball.dy = Math.abs(ball.dy);
                    ball.y = ball.radius;
                    spawnParticles(ball.x, ball.y, 8);
                }

                if (ball.y + ball.radius >= paddle.y &&
                    ball.y - ball.radius <= paddle.y + paddle.height &&
                    ball.x + ball.radius >= paddle.x &&
                    ball.x - ball.radius <= paddle.x + paddle.width) {
                    
                    ball.dy = -Math.abs(ball.dy);
                    ball.y = paddle.y - ball.radius;
                    
                    score++;
                    updateScore();
                    showLoveCombo();
                    spawnParticles(ball.x, ball.y, 18);
                    
                    const hitPos = (ball.x - paddle.x) / paddle.width;
                    const maxAngle = Math.PI / 2.2;
                    const newAngle = -Math.PI / 2 + (hitPos - 0.5) * maxAngle;
                    
                    ball.speed = 4.5 + (score * 0.28);
                    ball.speed = Math.min(ball.speed, 19);
                    ball.dx = ball.speed * Math.cos(newAngle);
                    ball.dy = -ball.speed * Math.abs(Math.sin(newAngle));
                    
                    paddle.width = Math.max(65, 130 - score * 1.8);
                }

                if (ball.y - ball.radius > canvasHeight) {
                    gameOver = true;
                    canRestart = false; 
                    setTimeout(() => { canRestart = true; }, 1000); 
                    
                    ball.y = canvasHeight + ball.radius;
                    comboCount = 0;
                    document.getElementById('comboMini').textContent = '';
                    document.getElementById('canvasWrapper').classList.add('game-over-glow');
                }

                updateParticles(dt);
            }

            function draw() {
                ctx.fillStyle = cachedBgGradient || '#060610';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);

                ball.trail.forEach((t) => {
                    if (t.life > 0) {
                        ctx.save();
                        ctx.globalAlpha = t.life * 0.2;
                        ctx.fillStyle = '#ffffff'; 
                        ctx.shadowBlur = 0;
                        const fs = Math.floor(ball.radius * 1.2);
                        ctx.font = `${fs}px ${EMOJI_FONT_STACK}`; 
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(selectedEmoji, t.x, t.y);
                        ctx.restore();
                    }
                });

                drawParticles();

                ctx.save();
                const padGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
                padGrad.addColorStop(0, '#dbeafe');
                padGrad.addColorStop(0.4, '#bfdbfe');
                padGrad.addColorStop(0.7, '#93c5fd');
                padGrad.addColorStop(1, '#60a5fa');
                
                ctx.shadowColor = 'rgba(147, 197, 253, 0.5)';
                ctx.shadowBlur = 12;
                ctx.fillStyle = padGrad;
                roundRect(ctx, paddle.x, paddle.y, paddle.width, paddle.height, 10);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                const hlGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height/2);
                hlGrad.addColorStop(0, 'rgba(255, 255, 255, 0.45)');
                hlGrad.addColorStop(1, 'rgba(255, 255, 255, 0)'); 
                ctx.fillStyle = hlGrad;
                roundRect(ctx, paddle.x, paddle.y, paddle.width, paddle.height/2, 10);
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#ffffff'; 
                ctx.shadowBlur = 0;
                const fsMain = Math.floor(ball.radius * 2);
                ctx.font = `${fsMain}px ${EMOJI_FONT_STACK}`; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(selectedEmoji, ball.x, ball.y);
                ctx.restore();

                if (gameOver) {
                    ctx.fillStyle = 'rgba(6, 6, 16, 0.82)';
                    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                    
                    const titleSize = Math.min(canvasWidth * 0.085, 36);
                    const scoreSize = Math.min(canvasWidth * 0.075, 30);
                    const subSize = Math.min(canvasWidth * 0.042, 18);
                    
                    ctx.fillStyle = '#93c5fd';
                    ctx.font = `bold ${titleSize}px "a"`;
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(147, 197, 253, 0.5)';
                    ctx.shadowBlur = 25;
                    ctx.fillText('بازی خراب شد..😔', canvasWidth/2, canvasHeight/2 - titleSize * 0.7);
                    ctx.shadowBlur = 0;
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${scoreSize}px "a"`;
                    ctx.fillText(`🌟 طلب بوس ${score} 🌟`, canvasWidth/2, canvasHeight/2 + scoreSize * 0.5);
                    
                    ctx.fillStyle = '#bfdbfe';
                    ctx.font = `${subSize}px "a"`;
                    
                    if (canRestart) {
                        ctx.fillText('یه دست دیگه بازی کنیم؟ (کلیک)', canvasWidth/2, canvasHeight/2 + scoreSize * 1.5);
                    }
                }
            }

            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            function updateScore() {
                const display = document.getElementById('scoreDisplay');
                display.textContent = score;
                display.classList.add('pop');
                setTimeout(() => display.classList.remove('pop'), 180);
            }

            function stopGame() {
                gameRunning = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (document.getElementById('gameScreen').classList.contains('active') && !gameOver) {
                        updateCanvasDimensions();
                    }
                }, 250);
            });
        })();
    </script>
</body>
</html>
